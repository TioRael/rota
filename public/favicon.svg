<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B1A"/>
      <stop offset="100%" style="stop-color:#E55A0F"/>
    </linearGradient>
  </defs>
  <!-- Fundo arredondado -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Letra R estilizada -->
  <text
    x="8"
    y="24"
    font-family="'Segoe UI', 'Arial Black', sans-serif"
    font-size="22"
    font-weight="900"
    fill="white"
    letter-spacing="-1"
  >R</text>
  <!-- Ponto de bussola decorativo (canto inferior direito) -->
  <circle cx="26" cy="26" r="3" fill="white" opacity="0.35"/>
  <circle cx="26" cy="26" r="1.5" fill="white" opacity="0.8"/>
</svg>
